        .is-invalid {

            background-repeat: no-repeat;
            background-position: right calc(0.375em + 0.1875rem) center;
            background-size: calc(0.75em + 0.375rem) calc(0.75em + 0.375rem);
        }
        .invalid-feedback {
            display: none;
            color: #e74a3b;
            font-size: 0.875em;

        }
    </style>

    <script>
        // Biến lưu trữ danh sách chương trình học
        let danhSachChuongTrinhHoc = [];
        // Biến theo dõi lỗi trùng mã học phần
        let hasDuplicateError = false;
        
        $(document).ready(function() {
            // Load menu
            includeHTML();
            
            // Hiển thị tên người dùng
            let tk = JSON.parse(localStorage.getItem('taiKhoan'));
            $('#userID').html(tk.ten + ' | ' + tk.userName);
            
            // Load danh sách chương trình học khi trang được tải
            loadDanhSachChuongTrinhHoc();
            
            // Thêm môn học mới
            $('#btnThemMonHoc').click(function() {
                themMonHoc();
            });
            
            // Xử lý submit form
            $('#chuongTrinhHocForm').submit(function(e) {
                e.preventDefault();
                luuChuongTrinhHoc();
            });
        });
        
        // Hàm load danh sách chương trình học từ API
        function loadDanhSachChuongTrinhHoc() {
            $.ajax({
                url: '/api/v1/chuongtrinhhoc',
                type: 'GET',
                success: function(response) {
                    danhSachChuongTrinhHoc = response;
                    renderDanhSachChuongTrinhHoc(response);
                },
                error: function(xhr, status, error) {
                    alert('Có lỗi khi tải danh sách chương trình học: ' + error);
                    console.error('Error:', xhr.responseJSON);
                }
            });
        }
        
        // Hàm hiển thị danh sách chương trình học theo khóa và chuyên ngành
        function renderDanhSachChuongTrinhHoc(data) {
            const container = $('#chuongTrinhHocContainer');
            container.empty();

            if (data.length === 0) {
                container.append('<div class="alert alert-info">Không có dữ liệu chương trình học</div>');
                return;
            }

            // Nhóm dữ liệu theo khóa học
            const groupedByKhoa = {};
            data.forEach(item => {
                if (!groupedByKhoa[item.khoa]) {
                    groupedByKhoa[item.khoa] = [];
                }
                groupedByKhoa[item.khoa].push(item);
            });

            // Sắp xếp các khóa theo thứ tự tăng dần (K30 -> K39)
            const sortedKhoas = Object.keys(groupedByKhoa).sort();

            // Duyệt qua từng khóa
            sortedKhoas.forEach(khoa => {
                const khoaGroup = $(`
                    <div class="khoa-group">
                        <div class="khoa-header">
                            Khóa: ${khoa}
                        </div>
                        <div class="card-body" id="khoa-${khoa}-body"></div>
                    </div>
                `);

                const khoaBody = khoaGroup.find(`#khoa-${khoa}-body`);

                // Nhóm các chương trình học trong khóa theo chuyên ngành
                const groupedByChuyenNganh = {};
                groupedByKhoa[khoa].forEach(item => {
                    const chuyenNganh = convertChuyenNganh(item.chuyenNganh);
                    if (!groupedByChuyenNganh[chuyenNganh]) {
                        groupedByChuyenNganh[chuyenNganh] = [];
                    }
                    groupedByChuyenNganh[chuyenNganh].push(item);
                });

                // Duyệt qua từng chuyên ngành trong khóa
                Object.keys(groupedByChuyenNganh).forEach(chuyenNganh => {
                    const chuongTrinhList = groupedByChuyenNganh[chuyenNganh];
                    const chuongTrinh = chuongTrinhList[0]; // Lấy phần tử đầu tiên để lấy thông tin chung
                    
                    const chuyenNganhCard = $(`
                        <div class="card chuyen-nganh-card">
                            <div class="chuyen-nganh-header" onclick="toggleChuyenNganhBody('${khoa}', '${chuongTrinh.chuyenNganh}')">
                                ${chuyenNganh}
                                <span class="badge badge-khoa">${khoa}</span>
                            </div>
                            <div class="chuyen-nganh-body" id="chuyen-nganh-${khoa}-${chuongTrinh.chuyenNganh}" style="display: none;">
                                <div class="row">
                                    <div class="col-md-12">
                                        <button class="btn btn-info btn-sm" onclick="xemChiTietTheoChuyenNganh('${khoa}', '${chuongTrinh.chuyenNganh}')">
                                            <i class="fas fa-eye"></i> Xem chi tiết
                                        </button>
                                        <button class="btn btn-danger btn-sm float-right" onclick="xoaChuongTrinhHocTheoChuyenNganh('${khoa}', '${chuongTrinh.chuyenNganh}')">
                                            <i class="fas fa-trash"></i> Xóa
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `);

                    khoaBody.append(chuyenNganhCard);
                });

                container.append(khoaGroup);
            });
        }

        // Hàm toggle hiển thị body của chuyên ngành
        function toggleChuyenNganhBody(khoa, chuyenNganh) {
            $(`#chuyen-nganh-${khoa}-${chuyenNganh}`).slideToggle();
        }

        // Hàm xem chi tiết theo chuyên ngành và khóa
        function xemChiTietTheoChuyenNganh(khoa, chuyenNganh) {
            const chuongTrinhs = danhSachChuongTrinhHoc.filter(item => 
                item.khoa === khoa && item.chuyenNganh === chuyenNganh
            );

            if (chuongTrinhs.length === 0) {
                alert('Không tìm thấy chương trình học');
                return;
            }

            // Hiển thị thông tin cơ bản
            $('#detailChuyenNganh').text(convertChuyenNganh(chuyenNganh));
            $('#detailKhoa').text(khoa);

            // Nhóm các môn học theo loại học phần
            const groupedByLoaiHocPhan = {};
            chuongTrinhs.forEach(chuongTrinh => {
                const loaiHocPhan = chuongTrinh.loaiHocPhan;
                if (!groupedByLoaiHocPhan[loaiHocPhan]) {
                    groupedByLoaiHocPhan[loaiHocPhan] = [];
                }
                // Thêm tất cả môn học của chương trình này vào loại học phần tương ứng
                if (chuongTrinh.monHocList && chuongTrinh.monHocList.length > 0) {
                    groupedByLoaiHocPhan[loaiHocPhan] = groupedByLoaiHocPhan[loaiHocPhan].concat(chuongTrinh.monHocList);
                }
            });

            // Hiển thị các loại học phần và môn học
            const container = $('#loaiHocPhanContainer');
            container.empty();

            // Duyệt qua từng loại học phần
            Object.keys(groupedByLoaiHocPhan).forEach(loaiHocPhan => {
                const monHocList = groupedByLoaiHocPhan[loaiHocPhan];
                const loaiHocPhanTitle = convertLoaiHocPhan(loaiHocPhan);
                
                const loaiHocPhanDiv = $(`
                    <div class="loai-hoc-phan">
                        <div class="loai-hoc-phan-title">${loaiHocPhanTitle}</div>
                        <div class="table-responsive">
                            <table class="table table-bordered mon-hoc-table">
                                <thead>
                                    <tr>
                                        <th>Mã HP</th>
                                        <th>Tên môn học</th>
                                        <th>Số TC</th>
                                        <th>ĐK tiên quyết</th>
                                    </tr>
                                </thead>
                                <tbody id="mon-hoc-${loaiHocPhan}"></tbody>
                            </table>
                        </div>
                    </div>
                `);

                const monHocBody = loaiHocPhanDiv.find(`#mon-hoc-${loaiHocPhan}`);
                
                if (monHocList.length > 0) {
                    monHocList.forEach(monHoc => {
                        monHocBody.append(`
                            <tr>
                                <td>${monHoc.maHocPhan}</td>
                                <td>${monHoc.tenMonHoc}</td>
                                <td>${monHoc.soTinChi}</td>
                                <td>${monHoc.dieuKienTienQuyet || 'Không'}</td>
                            </tr>
                        `);
                    });
                } else {
                    monHocBody.append('<tr><td colspan="4" class="text-center">Không có môn học</td></tr>');
                }

                container.append(loaiHocPhanDiv);
            });

            // Hiển thị modal
            $('#detailModal').modal('show');
        }

        // Hàm xóa chương trình học theo chuyên ngành và khóa
        function xoaChuongTrinhHocTheoChuyenNganh(khoa, chuyenNganh) {
            if (!confirm('Bạn có chắc chắn muốn xóa tất cả chương trình học của chuyên ngành ' + convertChuyenNganh(chuyenNganh) + ' khóa ' + khoa + '?')) {
                return;
            }
            
            // Lấy danh sách ID các chương trình học cần xóa
            const idsToDelete = danhSachChuongTrinhHoc
                .filter(item => item.khoa === khoa && item.chuyenNganh === chuyenNganh)
                .map(item => item.id);
            
            if (idsToDelete.length === 0) {
                alert('Không tìm thấy chương trình học để xóa');
                return;
            }
            
            // Gọi API xóa (giả sử API hỗ trợ xóa nhiều)
            $.ajax({
                url: '/api/v1/chuongtrinhhoc/delete-multiple',
                type: 'DELETE',
                contentType: 'application/json',
                data: JSON.stringify({ ids: idsToDelete }),
                success: function(response) {
                    alert('Xóa chương trình học thành công');
                    loadDanhSachChuongTrinhHoc(); // Load lại danh sách
                },
                error: function(xhr, status, error) {
                    alert('Có lỗi khi xóa chương trình học: ' + (xhr.responseJSON?.message || error));
                    console.error('Error:', xhr.responseJSON);
                }
            });
        }

        // Hàm chuyển đổi enum chuyên ngành thành tên hiển thị
        function convertChuyenNganh(enumValue) {
            const mapping = {
                'CONG_NGHE_THONG_TIN': 'Công nghệ thông tin',
                'KE_TOAN': 'Kế toán',
                'KHOA_HOC_MAY_TINH': 'Khoa học máy tính',
                'TRI_TUE_NHAN_TAO': 'Trí tuệ nhân tạo',
                'QUAN_TRI_KINH_DOANH': 'Quản trị kinh doanh'
            };
            return mapping[enumValue] || enumValue;
        }
        
        // Hàm chuyển đổi enum loại học phần thành tên hiển thị
        function convertLoaiHocPhan(enumValue) {
            const mapping = {
                'HOC_PHAN_DAI_CUONG': 'Học phần đại cương',
                'HOC_PHAN_CO_SO_NGANH': 'Học phần cơ sở ngành',
                'HOC_PHAN_BAT_BUOC_NGANH': 'Học phần bắt buộc ngành',
                'HOC_PHAN_LUA_CHON_NGANH': 'Học phần lựa chọn ngành',
                'HOC_PHAN_TU_DO': 'Học phần tự do'
            };
            return mapping[enumValue] || enumValue;
        }
        
        // Hàm thêm môn học mới vào form
        function themMonHoc() {
            const monHocId = Date.now(); // Tạo ID duy nhất cho mỗi môn học
            const monHocHtml = `
                <div class="mon-hoc-item" id="monHoc_${monHocId}">
                    <div class="mon-hoc-header">
                        <h6>Môn học mới</h6>
                        <span class="remove-mon-hoc" onclick="xoaMonHoc(${monHocId})">
                            <i class="fas fa-trash-alt"></i> Xóa
                        </span>
                    </div>
                    <div class="form-group row">
                        <label class="col-sm-2 col-form-label">Mã học phần</label>
                        <div class="col-sm-10">
                            <input type="text" class="form-control ma-hoc-phan-input" 
                                   id="maHocPhan_${monHocId}" 
                                   data-id="${monHocId}"
                                   oninput="checkDuplicateMaHocPhan(this)"
                                   onblur="checkDuplicateMaHocPhan(this)"
                                   required>
                            <div class="invalid-feedback" id="maHocPhanFeedback_${monHocId}">
                                Mã học phần đã tồn tại
                            </div>
                        </div>
                    </div>
                    <div class="form-group row">
                        <label class="col-sm-2 col-form-label">Tên môn học</label>
                        <div class="col-sm-10">
                            <input type="text" class="form-control" id="tenMonHoc_${monHocId}" required>
                        </div>
                    </div>
                    <div class="form-group row">
                        <label class="col-sm-2 col-form-label">Số tín chỉ</label>
                        <div class="col-sm-10">
                            <input type="number" class="form-control" id="soTinChi_${monHocId}" min="1" required>
                        </div>
                    </div>
                    <div class="form-group row">
                        <label class="col-sm-2 col-form-label">Điều kiện tiên quyết</label>
                        <div class="col-sm-10">
                            <input type="text" class="form-control" id="dieuKienTienQuyet_${monHocId}">
                        </div>
                    </div>
                </div>
            `;
            
            $('#monHocListContainer').append(monHocHtml);
        }

        // Hàm kiểm tra mã học phần trùng
        function checkDuplicateMaHocPhan(inputElement) {
            const currentId = $(inputElement).data('id');
            const currentMaHocPhan = $(inputElement).val().trim().toUpperCase();
            
            if (!currentMaHocPhan) {
                hasDuplicateError = false;
                $(inputElement).removeClass('is-invalid');
                $(`#maHocPhanFeedback_${currentId}`).hide();
                return true;
            }
            
            let isDuplicate = false;
            $('.ma-hoc-phan-input').each(function() {
                const id = $(this).data('id');
                if (id !== currentId) { // Không kiểm tra với chính nó
                    const maHocPhan = $(this).val().trim().toUpperCase();
                    if (maHocPhan && maHocPhan === currentMaHocPhan) {
                        isDuplicate = true;
                        return false; // Break vòng lặp
                    }
                }
            });
            
            const feedbackElement = $(`#maHocPhanFeedback_${currentId}`);
            if (isDuplicate) {
                $(inputElement).addClass('is-invalid');
                feedbackElement.show();
                hasDuplicateError = true;
            } else {
                $(inputElement).removeClass('is-invalid');
                feedbackElement.hide();
                hasDuplicateError = false;
            }
            
            return !isDuplicate;
        }

        // Hàm xóa môn học
        function xoaMonHoc(monHocId) {
            if (confirm('Bạn có chắc chắn muốn xóa môn học này?')) {
                $(`#monHoc_${monHocId}`).remove();
                // Sau khi xóa, kiểm tra lại các mã học phần còn lại
                $('.ma-hoc-phan-input').each(function() {
                    checkDuplicateMaHocPhan(this);
                });
            }
        }
        
        // Hàm reset form
        function resetForm() {
            $('#chuongTrinhHocForm')[0].reset();
            $('#monHocListContainer').empty();
            hasDuplicateError = false;
        }
        
        // Hàm lưu chương trình học
        function luuChuongTrinhHoc() {
            // Reset trạng thái lỗi trước khi kiểm tra
            hasDuplicateError = false;
            
            // Kiểm tra tất cả các mã học phần
            $('.ma-hoc-phan-input').each(function() {
                checkDuplicateMaHocPhan(this);
            });
            
            // Nếu có lỗi trùng thì dừng lại
            if (hasDuplicateError) {
                alert('Có mã học phần bị trùng. Vui lòng kiểm tra lại!');
                return;
            }
            
            // Kiểm tra các trường bắt buộc
            const chuyenNganh = $('#chuyenNganh').val();
            const khoa = $('#khoa').val();
            const loaiHocPhan = $('#loaiHocPhan').val();
            
            if (!chuyenNganh || !khoa || !loaiHocPhan) {
                alert('Vui lòng điền đầy đủ thông tin chuyên ngành, khóa học và loại học phần');
                return;
            }
            
            // Thu thập danh sách môn học
            const monHocList = [];
            let hasEmptyField = false;
            
            $('.mon-hoc-item').each(function() {
                const id = $(this).attr('id').split('_')[1];
                const maHocPhan = $(`#maHocPhan_${id}`).val();
                const tenMonHoc = $(`#tenMonHoc_${id}`).val();
                const soTinChi = $(`#soTinChi_${id}`).val();
                const dieuKienTienQuyet = $(`#dieuKienTienQuyet_${id}`).val();
                
                if (!maHocPhan || !tenMonHoc || !soTinChi) {
                    hasEmptyField = true;
                    return false; // Break vòng lặp each
                }
                
                monHocList.push({
                    maHocPhan: maHocPhan,
                    tenMonHoc: tenMonHoc,
                    soTinChi: parseInt(soTinChi),
                    dieuKienTienQuyet: dieuKienTienQuyet || "Không"
                });
            });
            
            if (hasEmptyField) {
                alert('Vui lòng điền đầy đủ thông tin cho tất cả môn học');
                return;
            }
            
            if (monHocList.length === 0) {
                alert('Vui lòng thêm ít nhất một môn học');
                return;
            }
            
            // Gửi dữ liệu lên server
            const data = {
                chuyenNganh: chuyenNganh,
                khoa: khoa,
                loaiHocPhan: loaiHocPhan,
                monHocList: monHocList
            };
            
            $.ajax({
                url: '/api/v1/chuongtrinhhoc',
                type: 'POST',
                contentType: 'application/json',
                data: JSON.stringify(data),
                success: function(response) {
                    alert('Thêm chương trình học thành công!');
                    resetForm();
                    loadDanhSachChuongTrinhHoc();
                    $('#myTab a[href="#view"]').tab('show');
                },
                error: function(xhr, status, error) {
                    alert('Có lỗi xảy ra: ' + (xhr.responseJSON?.message || error));
                    console.error('Error:', xhr.responseJSON);
                }
            });
        }
    </script>
</body>
</html>

        function loadDanhSachChuongTrinhHoc() {
            $.ajax({
                url: '/api/v1/chuongtrinhhoc',
                type: 'GET',
                success: function(response) {
                    danhSachChuongTrinhHoc = response;
                    renderDanhSachChuongTrinhHoc(response);
                },
                error: function(xhr, status, error) {
                    alert('Có lỗi khi tải danh sách chương trình học: ' + error);
                    console.error('Error:', xhr.responseJSON);
                }
            });

        // Hàm hiển thị danh sách chương trình học theo khóa và chuyên ngành

        function renderDanhSachChuongTrinhHoc(data) {
            const container = $('#chuongTrinhHocContainer');
            container.empty();

            if (data.length === 0) {
                container.append('<div class="alert alert-info">Không có dữ liệu chương trình học</div>');
                return;
            }

            // Nhóm dữ liệu theo khóa học
            const groupedByKhoa = {};
            data.forEach(item => {
                if (!groupedByKhoa[item.khoa]) {
                    groupedByKhoa[item.khoa] = [];
                }
                groupedByKhoa[item.khoa].push(item);
            });

            // Sắp xếp các khóa theo thứ tự tăng dần (K30 -> K39)
            const sortedKhoas = Object.keys(groupedByKhoa).sort();

            // Duyệt qua từng khóa
            sortedKhoas.forEach(khoa => {
                const khoaGroup = $(`
                    <div class="khoa-group">
                        <div class="khoa-header">
                            Khóa: ${khoa}
                        </div>
                        <div class="card-body" id="khoa-${khoa}-body"></div>
                    </div>
                `);

                const khoaBody = khoaGroup.find(`#khoa-${khoa}-body`);

                // Nhóm các chương trình học trong khóa theo chuyên ngành
                const groupedByChuyenNganh = {};
                groupedByKhoa[khoa].forEach(item => {
                    const chuyenNganh = convertChuyenNganh(item.chuyenNganh);
                    if (!groupedByChuyenNganh[chuyenNganh]) {
                        groupedByChuyenNganh[chuyenNganh] = [];
                    }
                    groupedByChuyenNganh[chuyenNganh].push(item);
                });

                // Duyệt qua từng chuyên ngành trong khóa
                Object.keys(groupedByChuyenNganh).forEach(chuyenNganh => {
                    const chuongTrinhList = groupedByChuyenNganh[chuyenNganh];
                    const chuongTrinh = chuongTrinhList[0]; // Lấy phần tử đầu tiên để lấy thông tin chung
                    
                    const chuyenNganhCard = $(`
                        <div class="card chuyen-nganh-card">
                            <div class="chuyen-nganh-header" onclick="toggleChuyenNganhBody('${khoa}', '${chuongTrinh.chuyenNganh}')">
                                ${chuyenNganh}
                                <span class="badge badge-khoa">${khoa}</span>
                            </div>
                            <div class="chuyen-nganh-body" id="chuyen-nganh-${khoa}-${chuongTrinh.chuyenNganh}" style="display: none;">
                                <div class="row">
                                    <div class="col-md-12">
                                        <button class="btn btn-info btn-sm" onclick="xemChiTietTheoChuyenNganh('${khoa}', '${chuongTrinh.chuyenNganh}')">
                                            <i class="fas fa-eye"></i> Xem chi tiết
                                        </button>
                                        <button class="btn btn-danger btn-sm float-right" onclick="xoaChuongTrinhHocTheoChuyenNganh('${khoa}', '${chuongTrinh.chuyenNganh}')">
                                            <i class="fas fa-trash"></i> Xóa
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `);

                    khoaBody.append(chuyenNganhCard);
                });

                container.append(khoaGroup);
            });
        }

        function xoaMonHocTrongChuongTrinh(khoa, chuyenNganh, loaiHocPhan, maHocPhan, buttonElement) {
            if (!confirm(`Bạn có chắc chắn muốn xóa môn học ${maHocPhan} khỏi chương trình học?`)) {
                return;
            }
            
            // Tìm chương trình học chứa môn học này
            const chuongTrinhIndex = danhSachChuongTrinhHoc.findIndex(item => 
                item.khoa === khoa && 
                item.chuyenNganh === chuyenNganh && 
                item.loaiHocPhan === loaiHocPhan
            );
            
            if (chuongTrinhIndex === -1) {
                alert('Không tìm thấy chương trình học');
                return;
            }
            
            const chuongTrinh = danhSachChuongTrinhHoc[chuongTrinhIndex];
            
            // Lọc bỏ môn học cần xóa
            const updatedMonHocList = chuongTrinh.monHocList.filter(
                monHoc => monHoc.maHocPhan !== maHocPhan
            );
            
            // Nếu không còn môn học nào thì xóa luôn chương trình học
            if (updatedMonHocList.length === 0) {
                xoaChuongTrinhHoc(chuongTrinh.id, buttonElement);
                return;
            }
            
            // Cập nhật danh sách môn học
            const updateData = {
                ...chuongTrinh,
                monHocList: updatedMonHocList
            };
            
            // Gọi API cập nhật bằng POST (vì không có PUT)
            $.ajax({
                url: '/api/v1/chuongtrinhhoc',
                type: 'POST',
                contentType: 'application/json',
                data: JSON.stringify(updateData),
                success: function(response) {
                    // Xóa chương trình học cũ
                    xoaChuongTrinhHoc(chuongTrinh.id, buttonElement, false);
                    
                    // Xóa dòng chứa môn học vừa xóa
                    $(buttonElement).closest('tr').remove();
                    
                    // Kiểm tra nếu không còn môn học nào thì ẩn bảng
                    const tableBody = $(buttonElement).closest('tbody');
                    if (tableBody.find('tr').length === 1) { // Chỉ còn dòng "Không có môn học"
                        tableBody.html('<tr><td colspan="5" class="text-center">Không có môn học</td></tr>');
                    }
                    
                    // Load lại danh sách
                    loadDanhSachChuongTrinhHoc();
                },
                error: function(xhr, status, error) {
                    alert('Có lỗi khi xóa môn học: ' + (xhr.responseJSON?.message || error));
                    console.error('Error:', xhr.responseJSON);
                }
            });
        }


        function xoaChuongTrinhHoc(id, buttonElement, showAlert = true) {
            $.ajax({
                url: `/api/v1/chuongtrinhhoc/${id}`,
                type: 'DELETE',
                success: function(response) {
                    if (showAlert) {
                        alert('Xóa chương trình học thành công');
                    }
                    if (buttonElement) {
                        $(buttonElement).closest('tr').remove();
                    }
                    loadDanhSachChuongTrinhHoc();
                },
                error: function(xhr, status, error) {
                    alert('Có lỗi khi xóa chương trình học: ' + (xhr.responseJSON?.message || error));
                    console.error('Error:', xhr.responseJSON);
                }
            });
        }


        // Hàm xóa chương trình học theo chuyên ngành và khóa
        function xoaChuongTrinhHocTheoChuyenNganh(khoa, chuyenNganh) {
            if (!confirm('Bạn có chắc chắn muốn xóa tất cả chương trình học của chuyên ngành ' + convertChuyenNganh(chuyenNganh) + ' khóa ' + khoa + '?')) {
                return;
            }
            
            // Lấy danh sách ID các chương trình học cần xóa
            const idsToDelete = danhSachChuongTrinhHoc
                .filter(item => item.khoa === khoa && item.chuyenNganh === chuyenNganh)
                .map(item => item.id);
            
            if (idsToDelete.length === 0) {
                alert('Không tìm thấy chương trình học để xóa');
                return;
            }
            
            // Gọi API xóa từng cái một
            const deletePromises = idsToDelete.map(id => {
                return $.ajax({
                    url: `/api/v1/chuongtrinhhoc/${id}`,
                    type: 'DELETE'
                });
            });
            
            $.when(...deletePromises).done(function() {
                alert('Xóa chương trình học thành công');
                loadDanhSachChuongTrinhHoc();
            }).fail(function(xhr, status, error) {
                alert('Có lỗi khi xóa chương trình học: ' + (xhr.responseJSON?.message || error));
                console.error('Error:', xhr.responseJSON);
            });
        }

        function luuChuongTrinhHoc() {
            try {
                console.log("Bắt đầu lưu chương trình học");
                
                // Validate dữ liệu chính
                const chuyenNganh = $('#chuyenNganh').val();
                const khoa = $('#khoa').val();
                const loaiHocPhan = $('#loaiHocPhan').val();
                
                if (!chuyenNganh || !khoa || !loaiHocPhan) {
                    alert('Vui lòng điền đầy đủ thông tin chương trình học');
                    return;
                }

                // Validate enum values
                if (!Object.values(ChuyenNganh).includes(chuyenNganh)) {
                    alert('Chuyên ngành không hợp lệ');
                    return;
                }
                if (!Object.values(KhoaHoc).includes(khoa)) {
                    alert('Khóa học không hợp lệ');
                    return;
                }
                if (!Object.values(LoaiHocPhan).includes(loaiHocPhan)) {
                    alert('Loại học phần không hợp lệ');
                    return;
                }

                // Thu thập danh sách môn học
                const monHocList = [];
                let hasEmptyField = false;
                
                $('.mon-hoc-item').each(function() {
                    const id = $(this).attr('id').split('_')[1];
                    const maHocPhan = $(`#maHocPhan_${id}`).val();
                    const tenMonHoc = $(`#tenMonHoc_${id}`).val();
                    const soTinChi = $(`#soTinChi_${id}`).val();
                    const soGio = $(`#soGio_${id}`).val();

                    const giangVienPhuTrach = $(`#giangVienPhuTrach_${id}`).val();
                    const maGiangVien = $(`#maGiangVien_${id}`).val();
                    const monThayThe = $(`#monThayThe_${id}`).val();
                    const dieuKienTienQuyet = $(`#dieuKienTienQuyet_${id}`).val();
                    
                    if (!maHocPhan || !tenMonHoc || !soTinChi || !soGio || !soCa || !heSo || !giangVienPhuTrach || !maGiangVien) {
                        hasEmptyField = true;
                        return false; // Break vòng lặp each
                    }
                    
                    monHocList.push({
                        maHocPhan: maHocPhan,
                        tenMonHoc: tenMonHoc,
                        soTinChi: parseInt(soTinChi),
                        soGio: parseInt(soGio),
                        soCa: parseInt(soCa),
                        heSo: parseInt(heSo),
                        giangVienPhuTrach: giangVienPhuTrach,
                        maGiangVien: maGiangVien,
                        monThayThe: monThayThe || "Không",
                        dieuKienTienQuyet: dieuKienTienQuyet || "Không"
                    });
                });
                
                if (hasEmptyField) {
                    alert('Vui lòng điền đầy đủ thông tin cho tất cả môn học');
                    return;
                }
                
                if (monHocList.length === 0) {
                    alert('Vui lòng thêm ít nhất một môn học');
                    return;
                }

                // Gửi dữ liệu lên server
                const data = {
                    chuyenNganh: chuyenNganh,
                    khoa: khoa,
                    loaiHocPhan: loaiHocPhan,
                    monHocList: monHocList
                };

                console.log("Dữ liệu sẽ gửi:", data);
                
                $.ajax({
                    url: '/api/v1/chuongtrinhhoc',
                    type: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify(data),
                    success: function(response) {
                        console.log("Phản hồi từ server:", response);
                        if (response && response.id) {
                            alert('Thêm chương trình học thành công!');
                            resetForm();
                            loadDanhSachChuongTrinhHoc();
                            $('#myTab a[href="#view"]').tab('show');
                        } else {
                            alert('Có lỗi xảy ra khi lưu dữ liệu');
                        }
                    },
                    error: function(xhr, status, error) {
                        console.error("Lỗi khi gọi API:", {
                            status: xhr.status,
                            response: xhr.responseText,
                            error: error
                        });
                        alert('Có lỗi xảy ra: ' + (xhr.responseJSON?.message || error));
                    }
                });
            } catch (error) {
                console.error('Lỗi trong hàm luuChuongTrinhHoc:', error);
                alert('Có lỗi xảy ra khi xử lý dữ liệu');
            }
        }

        // ===== CÁC HÀM XỬ LÝ TÌM KIẾM =====
		// ===== CÁC HÀM XỬ LÝ TÌM KIẾM =====
		function searchMonHoc() {
		    const keyword = $('#searchMonHocInput').val().trim();
		    
		    if (!keyword) {
		        alert('Vui lòng nhập mã hoặc tên môn học');
		        return;
		    }

		    // Hiển thị loading
		    $('#searchResultsContainer').html('<div class="text-center py-3"><i class="fas fa-spinner fa-spin"></i> Đang tìm kiếm...</div>');
		    $('#searchResultModal').modal('show');

		    $.ajax({
		        url: '/api/v1/chuongtrinhhoc/search',
		        type: 'GET',
		        data: { 
		            keyword: keyword 
		        },
		        success: function(response) {
		            if (!response || response.length === 0) {
		                $('#searchResultsContainer').html('<div class="alert alert-info">Không tìm thấy kết quả nào phù hợp</div>');
		                return;
		            }

		            displaySearchResults(response, keyword);
		        },
		        error: function(xhr) {
		            let errorMsg = 'Có lỗi khi tìm kiếm';
		            if (xhr.responseJSON?.message) {
		                errorMsg = xhr.responseJSON.message;
		            }
		            $('#searchResultsContainer').html(`<div class="alert alert-danger">${errorMsg}</div>`);
		            console.error('Lỗi tìm kiếm:', xhr.responseJSON);
		        }
		    });
		}

		function displaySearchResults(results, keyword) {
		    const container = $('#searchResultsContainer');
		    container.empty();

		    if (!results || results.length === 0) {
		        container.html('<div class="alert alert-info">Không tìm thấy kết quả nào phù hợp</div>');
		        return;
		    }

		    // Nhóm kết quả theo môn học (mã học phần + tên môn học)
		    const monHocMap = new Map();
		    
		    results.forEach(chuongTrinh => {
		        if (chuongTrinh.monHocList && chuongTrinh.monHocList.length > 0) {
		            chuongTrinh.monHocList.forEach(monHoc => {
		                const key = `${monHoc.maHocPhan}_${monHoc.tenMonHoc}`;
		                if (!monHocMap.has(key)) {
		                    monHocMap.set(key, {
		                        monHoc: monHoc,
		                        chuongTrinhList: []
		                    });
		                }
		                // Lưu cả thông tin môn học kèm theo chương trình
		                monHocMap.get(key).chuongTrinhList.push({
		                    ...chuongTrinh,
		                    monHocDetails: monHoc // Giữ lại thông tin môn học cụ thể
		                });
		            });
		        }
		    });

		    // Hiển thị kết quả dạng bảng chi tiết
		    monHocMap.forEach((value, key) => {
		        const { monHoc, chuongTrinhList } = value;
		        
		        // Header cho mỗi môn học
		        container.append(`
		            <div class="search-result-item mb-4">
		                <div class="search-result-header bg-light p-3">
		                    <h5>${monHoc.maHocPhan} - ${monHoc.tenMonHoc}</h5>
		                    <div class="text-muted">
		                        <span class="mr-3"><strong>Số tín chỉ:</strong> ${monHoc.soTinChi}</span>
		                        <span><strong>Số giờ:</strong> ${monHoc.soGio}</span>
		                    </div>
		                </div>
		                <div class="table-responsive">
		                    <table class="table table-bordered table-hover mon-hoc-table">
		                        <thead>
		                            <tr>
		                                <th>Khóa</th>
		                                <th>Chuyên ngành</th>
		                                <th>Loại HP</th>
		                                <th>Giảng viên</th>
		                                <th>Mã GV</th>
		                                <th>ĐK tiên quyết</th>
		                                <th>Môn thay thế</th>
		                            </tr>
		                        </thead>
		                        <tbody>
		        `);

		        // Thêm các dòng kết quả
		        const currentItem = container.find('.search-result-item').last();
		        const tbody = currentItem.find('tbody');
		        
		        chuongTrinhList.forEach(ct => {
		            const monHocDetails = ct.monHocDetails;
		            tbody.append(`
		                <tr>
		                    <td>${ct.khoa}</td>
		                    <td>${convertChuyenNganh(ct.chuyenNganh)}</td>
		                    <td>${convertLoaiHocPhan(ct.loaiHocPhan)}</td>
		                    <td>${monHocDetails.giangVienPhuTrach || 'Chưa có'}</td>
		                    <td>${monHocDetails.maGiangVien || 'Chưa có'}</td>
		                    <td>${monHocDetails.dieuKienTienQuyet || 'Không'}</td>
		                    <td>${monHocDetails.monThayThe || 'Không'}</td>
		                </tr>
		            `);
		        });

		        currentItem.append('</tbody></table></div></div>');
		    });
		}		
		
		// Gắn sự kiện click cho nút search
		$('#btnSearchMonHoc').click(function(e) {
		    e.preventDefault();
		    searchMonHoc();
		});

		// Gắn sự kiện enter cho input search
		$('#searchMonHocInput').keypress(function(e) {
		    if (e.which === 13) {
		        e.preventDefault();
		        searchMonHoc();
		    }
		});
    </script>
</body>
</html>

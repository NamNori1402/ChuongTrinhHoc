function changeEmail(){

$("#login").click(function(){
	userName=$('#userName').val();
	password=$('#password').val();
	if (userName !='' && password !=''){
		data = {userName: userName, password: password}
		$.ajax({
				url 		: '/dangnhap',
				type		: 'POST',
				dataType	: 'json',
				data 		:  JSON.stringify(data),
				contentType : 'application/json; charset=UTF-8',
				success : function(resp) {
					console.log(resp)
					mess = resp.content
					if (data.code==-1){
						alert ('Tên đăng nhập hoặc tài khoản không hợp lệ')
						return;
					} else {						
						if (mess =='quanTri'){
							window.location.replace("dashboardQuanTri.html");
						} else if (mess =='thuKy'){
							window.location.replace("dashboardThuKy.html");
						} else if (mess =='giangVien'){
							window.location.replace("dashboardGiangVien.html");
						} else {
							window.location.replace("dashboardSinhVien.html");
						}
					}
				}
		});	
	}
	else if (password == ''){
		$('#loading').html(loading)
		$.ajax({
				url 		: '/dangnhap/'+userName,
				type		: 'GET',
				dataType	: 'json',
				contentType : 'application/json; charset=UTF-8',
				success : function(resp) {
					$('#loading').html('')
					data=JSON.stringify(resp);
					$('#login').html('Đăng nhập');
					$("#userName").prop('disabled', true);
					$("#password").prop('disabled', false);
					$("#notify").html('Lấy mật khẩu đăng nhập trong email: <br/>' + userName + '@thanglong.edu.vn')
				}
		});	
	}

}); 
</script>

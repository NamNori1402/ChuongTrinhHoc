<script>
function changeEmail(){
	username=$('#username').val();
	$('#email').val(username+'@thanglong.edu.vn')
}
$("#login").click(function(){
	username=$('#username1').val();
	password=$('#password1').val();
	data = {username: username,password: password};
	console.log(data);
	$.ajax({
			url 		: '/taikhoan/login',
			type		: 'POST',
			dataType	: 'json',
			contentType : 'application/json; charset=UTF-8',
			data 		:  JSON.stringify(data),
			success : function(resp) {
				code ='';
				try{
					code = resp.code;
				} catch(e){}
				if (code == 1000){
					alert('Sai username hoặc password')
				} else {					
					localStorage.setItem('taiKhoan', JSON.stringify(resp));
					$.ajax({
							url 		: 'giangvien/listAll',
							type		: 'get',
							data 		: {action: 'list'},
							success : function(resp) {
								localStorage.setItem('cfgGiangVien', JSON.stringify(resp));
								window.location.href = "dashboard.html";
							}
					});
				}
			}
		});	
}); 
</script>
